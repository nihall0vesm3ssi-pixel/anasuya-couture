<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Anasuya Couture — Admin</title>
<style>
  :root{--black:#0a0a0a;--white:#fafaf7;--gold:#c9a84c;--gold-lt:#e8d5a3;--border:#2a2a2a;--grey:#888}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--black);color:var(--white);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
  a{color:var(--gold)}

  /* ── LOGIN ── */
  #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
  .login-box{background:#111;border:1px solid var(--border);padding:2.5rem 2rem;width:min(360px,90vw);text-align:center}
  .login-box h1{font-size:1rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:1.8rem}
  .login-box input{width:100%;background:#0a0a0a;border:1px solid var(--border);color:var(--white);padding:.7rem 1rem;font-size:.9rem;margin-bottom:1rem;outline:none}
  .login-box input:focus{border-color:var(--gold)}
  .login-box button{width:100%;background:var(--gold);color:var(--black);border:none;padding:.75rem;font-size:.85rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}
  .login-box button:hover{background:var(--gold-lt)}
  #login-err{color:#e55;font-size:.8rem;margin-top:.5rem;min-height:1.2em}

  /* ── SHELL ── */
  #app{display:none}
  header{background:#111;border-bottom:1px solid var(--border);padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
  header h1{font-size:.85rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
  #logout-btn{background:none;border:1px solid var(--border);color:var(--grey);padding:.4rem .8rem;cursor:pointer;font-size:.75rem;letter-spacing:.08em;text-transform:uppercase}
  #logout-btn:hover{border-color:var(--gold);color:var(--gold)}

  /* tabs */
  .tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 1.5rem}
  .tab-btn{background:none;border:none;color:var(--grey);padding:.9rem 1.2rem;cursor:pointer;font-size:.82rem;letter-spacing:.1em;text-transform:uppercase;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

  .tab-panel{display:none;padding:1.5rem}
  .tab-panel.active{display:block}

  /* toolbar */
  .toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.6rem}
  .toolbar h2{font-size:.85rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gold-lt)}
  .btn{background:var(--gold);color:var(--black);border:none;padding:.55rem 1rem;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}
  .btn:hover{background:var(--gold-lt)}
  .btn-danger{background:#c0392b}
  .btn-danger:hover{background:#e74c3c}
  .btn-sm{padding:.35rem .7rem;font-size:.72rem}

  /* table */
  .tbl-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:.8rem}
  th{background:#161616;color:var(--gold-lt);text-align:left;padding:.6rem .8rem;border-bottom:1px solid var(--border);font-weight:400;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
  td{padding:.6rem .8rem;border-bottom:1px solid #1a1a1a;vertical-align:top}
  tr:hover td{background:#0f0f0f}
  .badge{display:inline-block;padding:.2rem .5rem;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;border-radius:2px}
  .badge-avail{background:#1a3a1a;color:#6fcf6f}
  .badge-mto{background:#3a2a0a;color:#c9a84c}
  .badge-sold{background:#3a1a1a;color:#e55}
  .actions{display:flex;gap:.4rem}
  .img-preview{max-height:48px;max-width:64px;object-fit:cover;border:1px solid var(--border)}

  /* modal */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center}
  .modal-bg.open{display:flex}
  .modal{background:#111;border:1px solid var(--border);width:min(560px,96vw);max-height:92vh;overflow-y:auto;padding:1.8rem}
  .modal h3{font-size:.9rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:1.4rem}
  .form-row{margin-bottom:1rem}
  .form-row label{display:block;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);margin-bottom:.35rem}
  .form-row input,.form-row select,.form-row textarea{width:100%;background:#0a0a0a;border:1px solid var(--border);color:var(--white);padding:.6rem .8rem;font-size:.85rem;outline:none;font-family:inherit}
  .form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--gold)}
  .form-row textarea{resize:vertical;min-height:60px}
  .form-row small{display:block;color:var(--grey);font-size:.68rem;margin-top:.3rem}
  .modal-footer{display:flex;gap:.6rem;justify-content:flex-end;margin-top:1.4rem}
  .btn-cancel{background:#1a1a1a;color:var(--grey);border:1px solid var(--border);padding:.55rem 1rem;font-size:.78rem;cursor:pointer}
  .btn-cancel:hover{border-color:var(--gold);color:var(--gold)}

  /* feedback */
  #toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--gold);color:var(--black);padding:.7rem 1.2rem;font-size:.8rem;letter-spacing:.08em;display:none;z-index:300}

  /* empty */
  .empty{color:var(--grey);font-size:.82rem;padding:2rem;text-align:center}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>Anasuya Couture · Admin</h1>
    <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password"/>
    <button onclick="doLogin()">Enter</button>
    <div id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <h1>Anasuya Couture · Admin</h1>
    <button id="logout-btn" onclick="doLogout()">Logout</button>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-tab="products">Products</button>
    <button class="tab-btn" data-tab="enquiries">Enquiries</button>
  </div>

  <!-- PRODUCTS TAB -->
  <div id="tab-products" class="tab-panel active">
    <div class="toolbar">
      <h2>All Products</h2>
      <button class="btn" onclick="openAddModal()">+ Add Product</button>
    </div>
    <div class="tbl-wrap">
      <table id="products-table">
        <thead>
          <tr>
            <th>#</th><th>Image</th><th>Name</th><th>Category</th>
            <th>Fabric</th><th>Price</th><th>Status</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="products-body">
          <tr><td colspan="8" class="empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ENQUIRIES TAB -->
  <div id="tab-enquiries" class="tab-panel">
    <div class="toolbar">
      <h2>Enquiries</h2>
      <button class="btn btn-sm" onclick="loadEnquiries()">↻ Refresh</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr><th>Date / Time</th><th>Product</th><th>Channel</th></tr>
        </thead>
        <tbody id="enquiries-body">
          <tr><td colspan="3" class="empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-bg" id="product-modal">
  <div class="modal">
    <h3 id="modal-title">Add Product</h3>
    <input type="hidden" id="edit-id"/>
    <div class="form-row">
      <label>Number</label>
      <input type="text" id="f-number" placeholder="e.g. 27"/>
    </div>
    <div class="form-row">
      <label>Name *</label>
      <input type="text" id="f-name" placeholder="e.g. Crimson Ikat"/>
    </div>
    <div class="form-row">
      <label>Category *</label>
      <select id="f-category">
        <option value="saree">Saree</option>
        <option value="anarkali">Anarkali</option>
        <option value="coordsets">Coord Sets</option>
        <option value="frocks">Frocks</option>
        <option value="kids">Kids</option>
      </select>
    </div>
    <div class="form-row">
      <label>Fabric / Details</label>
      <textarea id="f-fabric" placeholder="Silk · Ivory · Gold border…"></textarea>
    </div>
    <div class="form-row">
      <label>Price</label>
      <input type="text" id="f-price" placeholder="₹12,500 or DM for Price"/>
    </div>
    <div class="form-row">
      <label>Availability</label>
      <select id="f-availability">
        <option value="available">Available</option>
        <option value="mto">Made to Order</option>
        <option value="sold">Sold</option>
      </select>
    </div>
    <div class="form-row">
      <label>Image filenames</label>
      <input type="text" id="f-images" placeholder="product27.jpg,product27b.jpg"/>
      <small>Comma-separated. Must match filenames deployed on your site.</small>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="saveProduct()">Save</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
// IMPORTANT: after you deploy your Worker, replace this URL with your Worker URL
// e.g. https://anasuya-couture-api.YOUR-SUBDOMAIN.workers.dev
const API = 'https://anasuya-couture.nihall0vesm3ssi.workers.dev';
const PASSWORD = 'Learn2L0ve';

// ── AUTH ──────────────────────────────────────────────────────────────────────
function doLogin(){
  const pw = document.getElementById('pw-input').value;
  if(pw === PASSWORD){
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadProducts();
  } else {
    document.getElementById('login-err').textContent = 'Incorrect password.';
  }
}
document.getElementById('pw-input').addEventListener('keydown', e => {
  if(e.key === 'Enter') doLogin();
});
function doLogout(){
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
}

// ── TABS ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    if(btn.dataset.tab === 'enquiries') loadEnquiries();
  });
});

// ── HELPERS ───────────────────────────────────────────────────────────────────
function authHeaders(){
  return { 'Content-Type':'application/json', 'Authorization': `Bearer ${PASSWORD}` };
}
function toast(msg, err=false){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err ? '#c0392b' : 'var(--gold)';
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2800);
}
function badgeHtml(avail){
  const map = { available: 'badge-avail', mto: 'badge-mto', sold: 'badge-sold' };
  const label = { available:'Available', mto:'Made to Order', sold:'Sold' };
  return `<span class="badge ${map[avail]||''}">${label[avail]||avail}</span>`;
}

// ── PRODUCTS ──────────────────────────────────────────────────────────────────
let products = [];

async function loadProducts(){
  try {
    const res = await fetch(`${API}/api/products`);
    products = await res.json();
    renderProducts();
  } catch(e){
    document.getElementById('products-body').innerHTML =
      `<tr><td colspan="8" class="empty">Could not load products — check your API URL in admin.html.</td></tr>`;
  }
}

function renderProducts(){
  const tbody = document.getElementById('products-body');
  if(!products.length){
    tbody.innerHTML = '<tr><td colspan="8" class="empty">No products yet.</td></tr>';
    return;
  }
  tbody.innerHTML = products.map(p => {
    const firstImg = (p.images||'').split(',')[0].trim();
    const imgHtml = firstImg
      ? `<img src="${firstImg}" class="img-preview" onerror="this.style.display='none'">`
      : '—';
    return `<tr>
      <td>${p.number||'—'}</td>
      <td>${imgHtml}</td>
      <td><strong>${p.name}</strong></td>
      <td>${p.category}</td>
      <td style="max-width:200px;font-size:.72rem;color:#aaa">${(p.fabric||'').substring(0,80)}${(p.fabric||'').length>80?'…':''}</td>
      <td style="white-space:nowrap">${p.price||'—'}</td>
      <td>${badgeHtml(p.availability)}</td>
      <td><div class="actions">
        <button class="btn btn-sm" onclick="openEditModal(${p.id})">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id},'${p.name.replace(/'/g,"\\'")}')">Del</button>
      </div></td>
    </tr>`;
  }).join('');
}

// ── ADD MODAL ─────────────────────────────────────────────────────────────────
function openAddModal(){
  document.getElementById('modal-title').textContent = 'Add Product';
  document.getElementById('edit-id').value = '';
  ['number','name','fabric','price','images'].forEach(f =>
    document.getElementById('f-'+f).value = '');
  document.getElementById('f-category').value = 'saree';
  document.getElementById('f-availability').value = 'available';
  document.getElementById('product-modal').classList.add('open');
}

function openEditModal(id){
  const p = products.find(x => x.id === id);
  if(!p) return;
  document.getElementById('modal-title').textContent = 'Edit Product';
  document.getElementById('edit-id').value = id;
  document.getElementById('f-number').value = p.number||'';
  document.getElementById('f-name').value = p.name||'';
  document.getElementById('f-category').value = p.category||'saree';
  document.getElementById('f-fabric').value = p.fabric||'';
  document.getElementById('f-price').value = p.price||'';
  document.getElementById('f-availability').value = p.availability||'available';
  document.getElementById('f-images').value = p.images||'';
  document.getElementById('product-modal').classList.add('open');
}

function closeModal(){
  document.getElementById('product-modal').classList.remove('open');
}

async function saveProduct(){
  const name = document.getElementById('f-name').value.trim();
  if(!name){ toast('Name is required.', true); return; }
  const body = {
    number:       document.getElementById('f-number').value.trim(),
    name,
    category:     document.getElementById('f-category').value,
    fabric:       document.getElementById('f-fabric').value.trim(),
    price:        document.getElementById('f-price').value.trim(),
    availability: document.getElementById('f-availability').value,
    images:       document.getElementById('f-images').value.trim(),
  };
  const id = document.getElementById('edit-id').value;
  const url = id ? `${API}/api/products/${id}` : `${API}/api/products`;
  const method = id ? 'PUT' : 'POST';
  try {
    const res = await fetch(url, { method, headers: authHeaders(), body: JSON.stringify(body) });
    if(!res.ok) throw new Error();
    closeModal();
    toast(id ? 'Product updated.' : 'Product added.');
    await loadProducts();
  } catch {
    toast('Save failed. Check API URL.', true);
  }
}

async function deleteProduct(id, name){
  if(!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  try {
    const res = await fetch(`${API}/api/products/${id}`, {
      method:'DELETE', headers: authHeaders()
    });
    if(!res.ok) throw new Error();
    toast('Product deleted.');
    await loadProducts();
  } catch {
    toast('Delete failed.', true);
  }
}

// ── ENQUIRIES ─────────────────────────────────────────────────────────────────
async function loadEnquiries(){
  const tbody = document.getElementById('enquiries-body');
  tbody.innerHTML = '<tr><td colspan="3" class="empty">Loading…</td></tr>';
  try {
    const res = await fetch(`${API}/api/enquiries`, { headers: authHeaders() });
    const rows = await res.json();
    if(!rows.length){
      tbody.innerHTML = '<tr><td colspan="3" class="empty">No enquiries yet.</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(r => {
      const dt = new Date(r.created_at);
      const fmt = dt.toLocaleString('en-IN', { dateStyle:'medium', timeStyle:'short' });
      const src = r.source === 'instagram'
        ? '<span style="color:#c13584">● Instagram</span>'
        : '<span style="color:#25d366">● WhatsApp</span>';
      return `<tr><td style="white-space:nowrap">${fmt}</td><td>${r.product_name||'—'}</td><td>${src}</td></tr>`;
    }).join('');
  } catch {
    tbody.innerHTML = '<tr><td colspan="3" class="empty">Could not load — check your API URL.</td></tr>';
  }
}

// Close modal on outside click
document.getElementById('product-modal').addEventListener('click', function(e){
  if(e.target === this) closeModal();
});
</script>
</body>
</html>
